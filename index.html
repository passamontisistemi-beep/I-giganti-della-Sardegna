<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>I Giganti della Sardegna</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#08111f;color:#fff}#map{height:72vh}.page{display:none}.active{display:block}.hero{position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px}.hero video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:-2}.overlay{position:absolute;inset:0;background:rgba(0,0,0,.45);z-index:-1}.card{max-width:460px;padding:24px;background:rgba(255,255,255,.1);border-radius:24px}.flags button,.toolbar button{margin:4px;padding:10px 12px;border:0;border-radius:14px;cursor:pointer}.flags button{background:none;font-size:28px}.toolbar{padding:10px;text-align:center;background:#0008;position:sticky;top:0;z-index:999}.toolbar button{background:#ffffff22;color:#fff}.cta{background:#ffd36b;color:#111;font-weight:bold}.ticker{padding:10px;background:#0008;white-space:nowrap;overflow:hidden}.ticker span{display:inline-block;padding-left:100%;animation:scroll 25s linear infinite}@keyframes scroll{to{transform:translateX(-100%)}}#info{padding:12px}.popupbtn{display:inline-block;padding:8px 12px;background:#ffd36b;color:#111;border-radius:10px;text-decoration:none}
</style>
</head>
<body>
<section id="home" class="page active">
<div class="hero">
<video autoplay muted loop playsinline>
<source src="video.mp4" type="video/mp4">
</video>
<div class="overlay"></div>
<div class="card">
<div class="flags"><button onclick="setLang('it')"><img src='https://flagcdn.com/w40/it.png' width='32'></button><button onclick="setLang('en')"><img src='https://flagcdn.com/w40/gb.png' width='32'></button><button onclick="setLang('fr')"><img src='https://flagcdn.com/w40/fr.png' width='32'></button><button onclick="setLang('de')"><img src='https://flagcdn.com/w40/de.png' width='32'></button><button onclick="setLang('es')"><img src='https://flagcdn.com/w40/es.png' width='32'></button></div>
<h1 id="title">I Giganti della Sardegna</h1>
<p id="subtitle">In 3500 anni abbiamo creato questi influencer oltre il mare e le coste</p>
<p id="desc">Nuraghi • Domus de Janas • Borghi • Comuni vicini</p>
<button class="flags button cta" onclick="showPage('app');setTimeout(initMap,200)">Esplora la mappa</button>
</div>
</div>
<div class="ticker"><span>News Sardegna • Cultura • Turismo • Eventi • Enogastronomia • Tradizioni</span></div>
</section>
<section id="app" class="page">
<div class="toolbar">
<button onclick="filterType('all')">Tutti</button>
<button onclick="filterType('nur')">Nuraghi</button>
<button onclick="filterType('dom')">Domus</button>
<button onclick="filterType('bor')">Borghi</button>
<button onclick="nearMe()">GPS</button>
<button onclick="showPage('home')">⬅</button>
</div>
<div id="map"></div>
<div id="info">Tocca un punto sulla mappa.</div>
<div class="ticker"><span>PASSAMONTI_COMMUNICATION</span></div>
</section>
<script>
let lang='it',map,markers=[];
const texts={it:{all:'Tutti',nur:'Nuraghi',dom:'Domus',bor:'Borghi'},en:{all:'All',nur:'Nuraghes',dom:'Domus',bor:'Villages'},fr:{all:'Tous',nur:'Nuraghes',dom:'Domus',bor:'Bourgs'},de:{all:'Alle',nur:'Nuraghen',dom:'Domus',bor:'Dörfer'},es:{all:'Todos',nur:'Nuragas',dom:'Domus',bor:'Pueblos'}};
function setLang(l){lang=l;}
function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');}
function wiki(slug){return 'https://'+lang+'.wikipedia.org/wiki/'+slug;}
const data="+js+";
data.forEach(d=>{d.name=(d.name||'').replace(/\s+/g,' ').trim();d.slug=(d.slug||d.name).replace(/\s+/g,'_');d.lat=parseFloat(d.lat);d.lng=parseFloat(d.lng);});
function initMap(){if(map)return;map=L.map('map').setView([40.1,9],8);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(map);filterType('all');}
function clr(t){if(t==='nur')return 'red';if(t==='dom')return 'green';if(t==='bor')return 'blue';return 'white';}
function filterType(t){markers.forEach(m=>map.removeLayer(m));markers=[];data.filter(x=>t==='all'||x.type===t).forEach(p=>{let m=L.circleMarker([p.lat,p.lng],{radius:8,color:'#fff',weight:2,fillColor:clr(p.type),fillOpacity:.9}).addTo(map);m.on('click',()=>{map.setView([p.lat,p.lng],12);m.bindPopup('<b>'+p.name+'</b><br><a class="popupbtn" target="_blank" href="'+wiki(p.slug)+'">Wikipedia</a>').openPopup();document.getElementById('info').innerHTML=p.name;});markers.push(m);});}
function nearMe(){navigator.geolocation?navigator.geolocation.getCurrentPosition(pos=>{map.setView([pos.coords.latitude,pos.coords.longitude],10)}):alert('GPS non disponibile');}
</script>
</body>
</html>
