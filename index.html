<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>I Giganti della Sardegna</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{
margin:0;
padding-bottom:60px;
font-family:Arial,sans-serif;
background:#08111f;
color:#fff;
}

#map{height:72vh;}

.page{display:none;}
.active{display:block;}

.hero{
position:relative;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
overflow:hidden;
}

.hero video{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

.overlay{
position:absolute;
inset:0;
background:linear-gradient(rgba(0,0,0,.35),rgba(0,0,0,.65));
z-index:-1;
}

.card{
max-width:520px;
padding:24px;
background:rgba(255,255,255,.10);
border-radius:24px;
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,.15);
box-shadow:0 20px 60px rgba(0,0,0,.45);
}

.flags button,
.toolbar button{
margin:4px;
padding:10px 12px;
border:0;
border-radius:14px;
cursor:pointer;
}

.flags button{
background:none;
}

.toolbar{
padding:10px;
text-align:center;
background:#0008;
position:sticky;
top:0;
z-index:999;
backdrop-filter:blur(10px);
}

.toolbar button{
background:#ffffff22;
color:#fff;
}

.cta{
background:#ffd36b;
color:#111;
font-weight:bold;
}

.searchbar{
padding:10px;
background:#06192d;
display:flex;
gap:8px;
}

.searchbar input{
flex:1;
padding:10px;
border-radius:12px;
border:0;
}

.searchbar button{
padding:10px 14px;
border:0;
border-radius:12px;
background:#ffd36b;
font-weight:700;
cursor:pointer;
}

.ticker{
padding:10px;
background:#0008;
white-space:nowrap;
overflow:hidden;
}

.ticker span{
display:inline-block;
padding-left:100%;
animation:scroll 35s linear infinite;
}

@keyframes scroll{
to{transform:translateX(-100%);}
}

#info{
padding:12px;
background:#0c1c2d;
}

.popupbtn{
display:inline-block;
padding:8px 12px;
background:#ffd36b;
color:#111;
border-radius:10px;
text-decoration:none;
font-weight:bold;
}

.logo{
position:fixed;
left:0;
right:0;
bottom:0;
background:#08111f;
padding:10px;
text-align:center;
font-weight:700;
z-index:1000;
}
</style>
</head>

<body>

<!-- HOME -->
<section id="home" class="page active">

<div class="hero">

<video autoplay muted loop playsinline>
<source src="video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="card">

<div class="flags">
<button onclick="setLang('it')"><img src="https://flagcdn.com/w40/it.png" width="32"></button>
<button onclick="setLang('en')"><img src="https://flagcdn.com/w40/gb.png" width="32"></button>
<button onclick="setLang('fr')"><img src="https://flagcdn.com/w40/fr.png" width="32"></button>
<button onclick="setLang('de')"><img src="https://flagcdn.com/w40/de.png" width="32"></button>
<button onclick="setLang('es')"><img src="https://flagcdn.com/w40/es.png" width="32"></button>
</div>

<h1>I Giganti della Sardegna</h1>
<p>In 3500 anni abbiamo creato questi influencer oltre il mare e le coste</p>
<p>Nuraghi • Domus de Janas • Borghi</p>

<button class="cta" onclick="showPage('app');setTimeout(initMap,300)">
Esplora la mappa
</button>

</div>
</div>

<div class="ticker">
<span>prova rss • prova rss • prova rss • prova rss • prova rss</span>
</div>

</section>

<!-- APP -->
<section id="app" class="page">

<div class="toolbar">
<button onclick="filterType('all')">Tutti</button>
<button onclick="filterType('nur')">Nuraghi</button>
<button onclick="filterType('dom')">Domus</button>
<button onclick="filterType('bor')">Borghi</button>
<button onclick="nearMe()">GPS</button>
<button onclick="showPage('home')">⬅</button>
</div>

<div class="searchbar">
<input id="search" placeholder="Cerca luogo...">
<button onclick="searchPlace()">Cerca</button>
</div>

<div id="map"></div>

<div id="info">
Tocca un punto della mappa.
</div>

<div class="ticker">
<span>prova rss • prova rss • prova rss • prova rss</span>
</div>

</section>

<div class="logo">PASSAMONTI_COMMUNICATION</div>

<script>
let lang="it";
let map;
let markers=[];

const texts={
it:{all:"Tutti",nur:"Nuraghi",dom:"Domus",bor:"Borghi",search:"Cerca luogo..."},
en:{all:"All",nur:"Nuraghi",dom:"Domus",bor:"Villages",search:"Search place..."},
fr:{all:"Tous",nur:"Nuraghes",dom:"Domus",bor:"Villages",search:"Rechercher..."},
de:{all:"Alle",nur:"Nuraghen",dom:"Domus",bor:"Dörfer",search:"Suchen..."},
es:{all:"Todos",nur:"Nuragas",dom:"Domus",bor:"Pueblos",search:"Buscar..."}
};

function setLang(l){
lang=l;
translateUI();
}

function translateUI(){
const t=texts[lang] || texts.it;
const btn=document.querySelectorAll(".toolbar button");
btn[0].innerText=t.all;
btn[1].innerText=t.nur;
btn[2].innerText=t.dom;
btn[3].innerText=t.bor;
document.getElementById("search").placeholder=t.search;
}

function wiki(slug){
return "https://" + lang + ".wikipedia.org/wiki/" + slug;
}

function openWiki(slug,name){
window.open(wiki(slug),"_blank");
setTimeout(()=>{
document.getElementById("info").innerHTML=
"Traduzione " + lang.toUpperCase() + ": " + name;
},700);
}

function showPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

const data=[
{name:"Su Nuraxi",type:"nur",lat:39.705,lng:8.997,slug:"Su_Nuraxi"},
{name:"Palmavera",type:"nur",lat:40.604,lng:8.289,slug:"Nuraghe_Palmavera"},
{name:"Santu Antine",type:"nur",lat:40.467,lng:8.696,slug:"Nuraghe_Santu_Antine"},
{name:"Losa",type:"nur",lat:40.103,lng:8.726,slug:"Nuraghe_Losa"},
{name:"Arrubiu",type:"nur",lat:39.495,lng:9.226,slug:"Nuraghe_Arrubiu"},

{name:"Montessu",type:"dom",lat:39.164,lng:8.615,slug:"Necropoli_di_Montessu"},
{name:"Anghelu Ruju",type:"dom",lat:40.629,lng:8.321,slug:"Anghelu_Ruju"},
{name:"Sant'Andrea Priu",type:"dom",lat:40.362,lng:8.622,slug:"Necropoli_di_Sant_Andrea_Priu"},

{name:"Bosa",type:"bor",lat:40.296,lng:8.498,slug:"Bosa"},
{name:"Castelsardo",type:"bor",lat:40.915,lng:8.714,slug:"Castelsardo"},
{name:"Carloforte",type:"bor",lat:39.141,lng:8.303,slug:"Carloforte"},
{name:"Posada",type:"bor",lat:40.629,lng:9.717,slug:"Posada"},
{name:"Aggius",type:"bor",lat:40.928,lng:8.981,slug:"Aggius"}
];

function initMap(){

if(map) return;

map=L.map("map").setView([40.1,9.0],8);

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{attribution:"© OpenStreetMap"}
).addTo(map);

filterType("all");
}

function markerColor(type){
if(type==="nur") return "red";
if(type==="dom") return "green";
if(type==="bor") return "blue";
return "white";
}

function filterType(type){

markers.forEach(m=>map.removeLayer(m));
markers=[];

data
.filter(item=>type==="all" || item.type===type)
.forEach(item=>{

let marker=L.circleMarker(
[item.lat,item.lng],
{
radius:8,
color:"#fff",
weight:2,
fillColor:markerColor(item.type),
fillOpacity:.95
}
).addTo(map);

marker.on("click",()=>{

map.setView([item.lat,item.lng],12);

marker.bindPopup(
"<b>"+item.name+"</b><br><br>" +
"<a href='#' class='popupbtn' onclick=\"openWiki('"+item.slug+"','"+item.name+"');return false;\">Wikipedia</a>"
).openPopup();

document.getElementById("info").innerHTML=item.name;

});

markers.push(marker);

});
}

function searchPlace(){
let q=document.getElementById("search").value.toLowerCase();
let found=data.find(x=>x.name.toLowerCase().includes(q));

if(found){
map.setView([found.lat,found.lng],13);
document.getElementById("info").innerHTML="Trovato: " + found.name;
}else{
document.getElementById("info").innerHTML="Nessun risultato";
}
}

function nearMe(){

if(!navigator.geolocation){
alert("GPS non disponibile");
return;
}

navigator.geolocation.getCurrentPosition(pos=>{

let lat=pos.coords.latitude;
let lng=pos.coords.longitude;

map.setView([lat,lng],10);

L.marker([lat,lng]).addTo(map)
.bindPopup("Tu sei qui")
.openPopup();

});
}
</script>

</body>
</html>
