<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>I Giganti della Sardegna</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#08111f;
color:#fff;
}

.page{display:none;}
.active{display:block;}

.hero{
position:relative;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
overflow:hidden;
}

.hero video{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,.45);
z-index:-1;
}

.card{
max-width:520px;
padding:24px;
background:rgba(255,255,255,.10);
border-radius:24px;
backdrop-filter:blur(12px);
}

.flags button,
.toolbar button{
margin:4px;
padding:10px 12px;
border:0;
border-radius:14px;
cursor:pointer;
}

.flags button{
background:none;
}

.toolbar{
padding:10px;
text-align:center;
background:#0008;
position:sticky;
top:0;
z-index:999;
}

.toolbar button{
background:#ffffff22;
color:#fff;
}

.cta{
background:#ffd36b;
color:#111;
font-weight:bold;
}

#map{
height:72vh;
}

#info{
padding:12px;
background:#0c1c2d;
}

.ticker{
padding:10px;
background:#0008;
white-space:nowrap;
overflow:hidden;
}

.ticker span{
display:inline-block;
padding-left:100%;
animation:scroll 25s linear infinite;
}

@keyframes scroll{
to{transform:translateX(-100%);}
}

.popupbtn{
display:inline-block;
padding:8px 12px;
background:#ffd36b;
color:#111;
border-radius:10px;
text-decoration:none;
font-weight:bold;
}
</style>
</head>

<body>

<!-- HOME -->
<section id="home" class="page active">

<div class="hero">

<video autoplay muted loop playsinline>
<source src="video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="card">

<div class="flags">
<button onclick="setLang('it')"><img src="https://flagcdn.com/w40/it.png" width="32"></button>
<button onclick="setLang('en')"><img src="https://flagcdn.com/w40/gb.png" width="32"></button>
<button onclick="setLang('fr')"><img src="https://flagcdn.com/w40/fr.png" width="32"></button>
<button onclick="setLang('de')"><img src="https://flagcdn.com/w40/de.png" width="32"></button>
<button onclick="setLang('es')"><img src="https://flagcdn.com/w40/es.png" width="32"></button>
</div>

<h1>I Giganti della Sardegna</h1>
<p>In 3500 anni abbiamo creato questi influencer oltre il mare e le coste</p>
<p>Nuraghi • Domus de Janas • Borghi</p>

<button class="cta" onclick="showPage('app');setTimeout(initMap,300)">
Esplora la mappa
</button>

</div>
</div>

<div class="ticker">
<span>News Sardegna • Cultura • Turismo • UNESCO • Eventi • Tradizioni • Sapori autentici</span>
</div>

</section>

<!-- MAPPA -->
<section id="app" class="page">

<div class="toolbar">
<button onclick="filterType('all')">Tutti</button>
<button onclick="filterType('nur')">Nuraghi</button>
<button onclick="filterType('dom')">Domus</button>
<button onclick="filterType('bor')">Borghi</button>
<button onclick="nearMe()">GPS</button>
<button onclick="showPage('home')">⬅</button>
</div>

<div id="map"></div>

<div id="info">Tocca un punto della mappa.</div>

<div class="ticker">
<span>PASSAMONTI_COMMUNICATION</span>
</div>

</section>

<script>

let markers=[];

function setLang(l){
lang=l;
}

function wiki(slug){
return "https://" + lang + ".wikipedia.org/wiki/" + slug;
}

function showPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function initMap(){
if(map) return;

map=L.map("map").setView([40.1,9.0],8);

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{attribution:"© OpenStreetMap"}
).addTo(map);

filterType("all");
}

function markerColor(type){
if(type==="nur") return "red";
if(type==="dom") return "green";
if(type==="bor") return "blue";
return "white";
}

function filterType(type){

markers.forEach(m=>map.removeLayer(m));
markers=[];

data
.filter(item=>type==="all" || item.type===type)
.forEach(item=>{

let marker=L.circleMarker(
[item.lat,item.lng],
{
radius:8,
color:"#fff",
weight:2,
fillColor:markerColor(item.type),
fillOpacity:.95
}
).addTo(map);

marker.on("click",()=>{

map.setView([item.lat,item.lng],12);

marker.bindPopup(
"<b>"+item.name+"</b><br><br>" +
"<a class='popupbtn' target='_blank' href='"+wiki(item.slug)+"'>Wikipedia</a>"
).openPopup();

document.getElementById("info").innerHTML=item.name;

});

markers.push(marker);

});

}

function nearMe(){

if(!navigator.geolocation){
alert("GPS non disponibile");
return;
}

navigator.geolocation.getCurrentPosition(pos=>{

let lat=pos.coords.latitude;
let lng=pos.coords.longitude;

map.setView([lat,lng],10);

L.marker([lat,lng]).addTo(map)
.bindPopup("Tu sei qui")
.openPopup();

});
}
</script>

</body>
</html>
